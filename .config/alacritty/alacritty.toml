[env]
TERM = "xterm-256color"

[window]
dynamic_padding = true
decorations = "none"
opacity = 0.70

[window.dimensions]
columns = 100
lines = 30

[colors.primary]
background = "0x000000"
foreground = "0xffffff"

[colors.normal]
black =   "0x1a1a1a"
red =     "0x4d4d4d"
green =   "0x808080"
yellow =  "0x999999"
blue =    "0xb3b3b3"
magenta = "0xcccccc"
cyan =    "0xe6e6e6"
white =   "0xffffff"

[font]
size = 11.0

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0

[cursor]
style = "Beam"
unfocused_hollow = true

[general]
live_config_reload = true

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"

[keyboard]
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
